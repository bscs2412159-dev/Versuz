<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Versuz — Create Account</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">

  <div class="auth-visual">
    <div style="position:relative;z-index:1;">
      <div class="brand" style="margin-bottom:8px;">
        <span class="split"></span> VERSUZ
      </div>
      <p class="eyebrow" style="margin-top:4px;">SPORTS MATCHMAKING</p>
    </div>

    <div style="position:relative;z-index:1;">
      <h2 style="margin-bottom:14px;">Pick a side.<br>Start a rivalry.</h2>
      <p style="max-width:360px;">Create your account, build a roster, and start booking matches against real teams near you.</p>
    </div>

    <p class="eyebrow" style="position:relative;z-index:1;">JOIN 60+ TEAMS ALREADY COMPETING</p>
  </div>

  <div class="auth-form-col">
    <div class="auth-box">
      <h1>Create account</h1>
      <p class="sub">Already registered? <a href="index.html" class="link-accent">Sign in</a></p>

      <div class="alert" id="authAlert"></div>

      <form id="signupForm">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" placeholder="Rehan Khan" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@club.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="signupBtn" style="margin-top:6px;">
          <span class="spinner"></span><span class="btn-label">Create account</span>
        </button>
      </form>

      <p style="margin-top:28px;font-size:.78rem;color:var(--text-mute);text-align:center;">
        By continuing you agree to Versuz's Terms &amp; Fair Play Policy.
      </p>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script>
  document.getElementById("signupForm").addEventListener("submit", handleSignup);
</script>
</body>
</html>
