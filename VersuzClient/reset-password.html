<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Versuz — Reset Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">

  <div class="auth-visual">
    <div style="position:relative;z-index:1;">
      <div class="brand" style="margin-bottom:8px;">
        <span class="split"></span> VERSUZ
      </div>
      <p class="eyebrow" style="margin-top:4px;">SPORTS MATCHMAKING</p>
    </div>

    <div style="position:relative;z-index:1;">
      <h2 style="margin-bottom:14px;">Reset your password</h2>
      <p style="max-width:360px;">Enter a new password below to regain access to your account.</p>
    </div>
  </div>

  <div class="auth-form-col">
    <div class="auth-box">
      <h1>Reset Password</h1>
      <p class="sub">Remembered it? <a href="index.html" class="link-accent">Sign in</a></p>

      <div class="alert" id="resetAlert"></div>

      <form id="resetForm">
        <div class="field">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm new password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="resetBtn" style="margin-top:6px;">
          <span class="spinner"></span><span class="btn-label">Reset password</span>
        </button>
      </form>

      <p style="margin-top:28px;font-size:.78rem;color:var(--text-mute);text-align:center;">
        For your security, this link will expire after 1 hour.
      </p>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script>
  document.getElementById("resetForm").addEventListener("submit", handleResetPassword);
</script>
</body>
</html>
