<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Versuz — Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand"><span class="split"></span> VERSUZ</div>

    <nav class="nav-group">
      <div class="nav-label">Overview</div>
      <a class="nav-link active" href="dashboard.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Dashboard
      </a>
      <a class="nav-link" href="matches.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l7 7-7 7M20 4l-7 7 7 7"/></svg>
        Matches
      </a>
      <a class="nav-link" href="teams.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="10" r="2.5"/><path d="M3 20c0-3 2.5-5 6-5s6 2 6 5M14 15c3 0 6.5 1.6 7 5"/></svg>
        Teams
      </a>
      <a class="nav-link" href="sports.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/></svg>
        Sports
      </a>
    </nav>

    <nav class="nav-group">
      <div class="nav-label">Account</div>
      <a class="nav-link" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.2a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.2a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.2a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9c.4.4.9.7 1.5.8h.2a2 2 0 110 4h-.2a1.7 1.7 0 00-1.5 1z"/></svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-foot">
      <div class="avatar-ring">RK</div>
      <div>
        <div class="who">Rehan Khan</div>
        <div class="role">Team Manager</div>
      </div>
      <button class="btn-ghost" style="margin-left:auto;background:none;border:none;color:var(--text-mute);cursor:pointer;padding:6px;border-radius:8px;" onclick="logout()" title="Log out" aria-label="Log out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div>
        <p class="eyebrow">WELCOME BACK</p>
        <h1 id="welcomeHeading">Your Dashboard</h1>
      </div>
      <div class="flex gap-12" style="flex-wrap:wrap;">
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" placeholder="Search teams, matches...">
        </div>
        <button class="btn btn-primary">+ New Match</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stat-grid" id="statsGrid">
      <div class="stat-card">
        <p class="eyebrow">RECORD</p>
        <div class="value" id="statRecord">—</div>
        <div class="delta up" id="statWinRate">—</div>
      </div>
      <div class="stat-card">
        <p class="eyebrow">LIVE NOW</p>
        <div class="value" id="statLiveCount">—</div>
        <div class="delta" style="color:var(--coral);" id="statLiveLabel"></div>
      </div>
      <div class="stat-card">
        <p class="eyebrow">UPCOMING</p>
        <div class="value" id="statUpcomingCount">—</div>
        <div class="delta" style="color:var(--text-mute);" id="statUpcomingLabel"></div>
      </div>
      <div class="stat-card">
        <p class="eyebrow">TEAMS TRACKED</p>
        <div class="value" id="statTeamsTracked">—</div>
        <div class="delta up" id="statTeamsDelta"></div>
      </div>
    </div>

    <div class="grid-2">
      <!-- Matches -->
      <div>
        <div class="section-head">
          <h3>Your Matchups</h3>
          <a href="matches.html" class="link-accent" style="font-size:.85rem;">View all →</a>
        </div>

        <div class="flex" style="flex-direction:column;gap:14px;" id="matchupsList">
          <p style="color:var(--text-mute);font-size:.85rem;">Loading matchups...</p>
        </div>
      </div>

      <!-- Side panel -->
      <div>
        <div class="section-head"><h3>Top Teams</h3></div>
        <div class="card card-tight" id="topTeamsList">
          <p style="color:var(--text-mute);font-size:.85rem;padding:12px;">Loading...</p>
        </div>

        <div class="section-head mt-32"><h3>Sports You Play</h3></div>
        <div class="flex gap-8" style="flex-wrap:wrap;" id="sportsTags"></div>
      </div>
    </div>
  </main>

</div>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
  requireAuth();
  renderCurrentUser();
  loadDashboard();
</script>
</body>
</html>
